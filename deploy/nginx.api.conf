limit_req_zone  $binary_remote_addr  zone=api_general:10m   rate=30r/s;
limit_req_zone  $binary_remote_addr  zone=api_generate:10m  rate=5r/s;
limit_conn_zone $binary_remote_addr  zone=per_ip_conn:10m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

gzip             on;
gzip_comp_level  4;
gzip_min_length  256;
gzip_vary        on;
gzip_proxied     any;
gzip_types
    application/json
    application/javascript
    application/xml
    text/css
    text/javascript
    text/plain
    text/xml;

server {
    listen 80;
    server_name fake-email.site _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend "http://app:3001";

    access_log /var/log/nginx/api_access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/api_error.log  warn;

    client_max_body_size        10m;
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 8k;

    client_body_timeout   15s;
    client_header_timeout 15s;
    send_timeout          30s;
    keepalive_timeout     65s;
    keepalive_requests    1000;

    limit_conn per_ip_conn 60;

    add_header X-Content-Type-Options  "nosniff"                              always;
    add_header X-Frame-Options         "DENY"                                 always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;
    add_header X-Request-Id            $request_id                            always;

    server_tokens off;

    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    location = /healthz {
        access_log off;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    location = /api/email/generate {
        limit_req        zone=api_generate burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         $backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    15s;
        proxy_read_timeout    30s;
    }

    location /api/ {
        limit_req        zone=api_general burst=60 nodelay;
        limit_req_status 429;

        proxy_pass         $backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;

        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 8k;
        proxy_busy_buffers_size 16k;

        proxy_hide_header X-Powered-By;

        proxy_next_upstream         error timeout http_502 http_503;
        proxy_next_upstream_tries   2;
        proxy_next_upstream_timeout 10s;
    }

    location ~* ^/(\.env|\.git|wp-admin|wp-login|wp-content|phpmy|phpmyadmin|cgi-bin|actuator|debug) {
        access_log off;
        return 444;
    }

    location ~ /\. {
        deny all;
        access_log off;
        return 404;
    }

    location / {
        default_type application/json;
        return 404 '{"error":"not_found","message":"The requested resource does not exist."}';
    }

    error_page 429 = @err_429;
    location @err_429 {
        default_type application/json;
        return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Please retry later."}';
    }

    error_page 502 503 504 = @err_50x;
    location @err_50x {
        default_type application/json;
        return 502 '{"error":"service_unavailable","message":"The service is temporarily unavailable. Please try again shortly."}';
    }

    error_page 413 = @err_413;
    location @err_413 {
        default_type application/json;
        return 413 '{"error":"payload_too_large","message":"Request body exceeds the maximum allowed size."}';
    }

    error_page 408 = @err_408;
    location @err_408 {
        default_type application/json;
        return 408 '{"error":"request_timeout","message":"The request timed out."}';
    }
}
